name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 pinned to SHA for Codacy compliance

      - uses: dtolnay/rust-toolchain@be73d7920c329f220ce78e7b5dd08e46e4b5a6e3  # pinned to SHA for stable (Codacy requires full commit SHA, not tag)
        with:
          components: clippy

      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - run: cargo test --verbose
      - run: cargo clippy -- -D warnings